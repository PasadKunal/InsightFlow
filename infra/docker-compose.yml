# Full local stack for InsightFlow: dashboard + API + PostgreSQL + Redis.
#
#   docker compose -f infra/docker-compose.yml up --build
#
# Then open http://localhost:8080 for the dashboard. The API is proxied through it at
# /api, and also exposed directly on http://localhost:8000/docs.
#
# (For pure Python dev you don't need any of this — the API defaults to SQLite and an
#  in-memory cache. This compose file is the production-shaped setup.)

services:
  postgres:
    image: postgres:16-alpine
    container_name: insightflow-postgres
    environment:
      POSTGRES_USER: insightflow
      POSTGRES_PASSWORD: insightflow
      POSTGRES_DB: insightflow
    ports:
      - "5432:5432"
    volumes:
      - insightflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insightflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: insightflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: insightflow-api
    environment:
      DATABASE_URL: postgresql+psycopg://insightflow:insightflow@postgres:5432/insightflow
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    container_name: insightflow-web
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  insightflow_pgdata:
