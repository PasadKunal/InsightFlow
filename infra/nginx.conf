# nginx config for the dashboard container.
#
# Serves the static React build and reverse-proxies API calls to the api service.
# The trailing slash on `proxy_pass` strips the `/api` prefix, mirroring the Vite dev
# proxy - so the frontend code is identical in dev and prod.

server {
    listen 80;
    server_name _;

    # API -> FastAPI container (Docker Compose service name `api`).
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static assets + SPA fallback (client-side routing).
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
