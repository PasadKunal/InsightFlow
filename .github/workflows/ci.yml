name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with all extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,uplift,reporting,dev]"

      - name: Run the test suite
        run: pytest -q

      - name: Run the 500-experiment validation harness
        run: python validation/simulation_harness.py

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build

  docker:
    name: Docker — build images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f infra/Dockerfile.api -t insightflow-api .

      - name: Build dashboard image
        run: docker build -f infra/Dockerfile.web -t insightflow-web .
